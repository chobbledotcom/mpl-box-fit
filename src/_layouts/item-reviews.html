---
layout: "base.html"
---

<section id="item">
  <div>{% include "item-title.html" %}</div>

  {% include "item-gallery.html" %}

  <div class="description">
    {% assign reviews = collections.reviews | getReviewsFor: item.fileSlug,
    item.data.tags %} {%- if reviews.size > 0 -%}
    <h2 id="reviews">Reviews</h2>
    {%- include "items.html", items: reviews, compact: true -%} {%- endif -%}
  </div>
</section>
