{%- comment -%}
Search results component.
Hosts the Pagefind result list and load-more control.
The frontend search script populates the inner elements.
{%- endcomment -%}

<div data-pagefind-ignore>
  <div id="search-results">
    <p class="search-message"></p>
    <ul class="search-results-list"></ul>
    <button class="search-load-more btn btn--secondary" hidden>Load more</button>
  </div>
</div>
