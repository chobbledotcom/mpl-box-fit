{%- comment -%}
Internal partial: emits a "Categories: <links>" paragraph when the page
has categories. Used by product-meta and property-content.
{%- endcomment -%}
{%- if categories.size > 0 -%}
  <p>
    <strong>Categories:</strong>
    {{ categories | linkList: collections.categories }}
  </p>
{%- endif -%}
