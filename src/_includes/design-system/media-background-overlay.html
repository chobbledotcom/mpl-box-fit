{%- comment -%}
Overlay figure for the *-background blocks. Renders hero-style content
(badge, markdown content in .prose, buttons) inside a <figcaption>, or
nothing at all for media-only blocks.

Parameters:
  - block.badge: Optional badge text above the content
  - block.content: Markdown content rendered in .prose
  - block.buttons: Array of {text, href, variant, size} button objects

Usage:
  {% include "design-system/media-background-overlay.html", block: block %}
{%- endcomment -%}

{%- if block.badge or block.content or block.buttons.size > 0 -%}
  <figure>
    <figcaption>
      {%- include "design-system/hero-content.html", block: block -%}
    </figcaption>
  </figure>
{%- endif -%}
