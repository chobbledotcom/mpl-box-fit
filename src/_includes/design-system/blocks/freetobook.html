{%- comment -%}
Freetobook block - renders a Freetobook booking iframe inside a collapsible
`<details>` element. Renders nothing when `freetobook_token` is not set.

Property-only block. No block-level parameters.
{%- endcomment -%}

{%- if freetobook_token -%}
<section id="freetobook" class="freetobook">
  <details class="container-wide">
    <summary class="btn btn--primary">Check Availability / Book Online</summary>
    <div class="iframe-container">
      <iframe
        src="https://booking-directly.com/widgets/{{ freetobook_token }}/properties"
        loading="lazy"
      ></iframe>
    </div>
  </details>
</section>
{%- endif -%}
