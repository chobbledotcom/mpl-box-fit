{%- capture add_to_cart_button -%}<button class="add-to-cart{% if extra_class %} {{ extra_class }}{% endif %}" data-item="{{ cart_attributes }}"{% if disabled %} disabled{% endif %}>{{ btn_text }}</button>{%- endcapture -%}
{%- if show_quantity -%}
<div class="list-item-cart-controls">
  {{ add_to_cart_button }}
  {%- include "list-item-quantity-selector.html", max_quantity: max_quantity -%}
</div>
{%- else -%}
{{ add_to_cart_button }}
{%- endif -%}
